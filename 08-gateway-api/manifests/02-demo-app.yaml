# -------------------------------------------------------------------
# 02-demo-app.yaml
# Deployment y Service de la aplicación de demostración.
# Utiliza nginxinc/nginx-unprivileged con hardening de seguridad
# para ser consistente con lo aprendido en el módulo 02-trivy-k8s.
# -------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: envoy-gateway-system
  labels:
    app: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo
          image: docker.io/nginxinc/nginx-unprivileged:stable-alpine
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: cache-volume
              mountPath: /var/cache/nginx
            - name: run-volume
              mountPath: /var/run
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: run-volume
          emptyDir: {}
        - name: tmp-volume
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: envoy-gateway-system
  labels:
    app: demo-app
spec:
  selector:
    app: demo-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: ClusterIP
