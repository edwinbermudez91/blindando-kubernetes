# -------------------------------------------------------------------
# 03-httproute.yaml
# Define las reglas de enrutamiento HTTP que conectan el Gateway
# (en envoy-gateway-system) con el Service de la aplicación (en demo-app).
# Este enrutamiento cross-namespace es una ventaja clave de la Gateway API.
# -------------------------------------------------------------------
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: demo-app-route
  namespace: demo-app
spec:
  # Referencia al Gateway en el namespace de infraestructura
  parentRefs:
    - name: gateway-lab
      namespace: envoy-gateway-system

  rules:
    # Enrutar el prefijo raíz "/" a la aplicación demo (mismo namespace)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: demo-app
          port: 80
