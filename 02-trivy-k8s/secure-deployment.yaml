apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-secure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-secure
  template:
    metadata:
      labels:
        app: demo-secure
      annotations:
        # La imagen utiliza el FQIN (Fully Qualified Image Name) con el dominio
        # explícito docker.io, que está declarado como registro de confianza
        # en trivy-trusted-registries-policy.yaml (ConfigMap del Trivy Operator).
        app.registry/trusted: "docker.io"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: demo
          image: docker.io/nginxinc/nginx-unprivileged:1.21-alpine
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          volumeMounts:
            - name: cache-volume
              mountPath: /var/cache/nginx
            - name: run-volume
              mountPath: /var/run
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: run-volume
          emptyDir: {}
        - name: tmp-volume
          emptyDir: {}
